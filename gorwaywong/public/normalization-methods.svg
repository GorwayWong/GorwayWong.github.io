<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Normalization methods comparison</title>
  <desc id="desc">A compact diagram comparing BatchNorm, LayerNorm, InstanceNorm, and GroupNorm normalization ranges over N, C, H and W dimensions.</desc>
  <rect width="960" height="540" fill="#eef6fb"/>
  <rect x="24" y="24" width="912" height="492" rx="12" fill="#fffdf4" stroke="#2f5f9f" stroke-width="2"/>
  <text x="480" y="60" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2f52">Normalization Scope Cheat Sheet</text>
  <text x="480" y="88" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="15" fill="#607088">N = samples, C = channels, H/W = spatial positions</text>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#234169" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="blue" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8fc6f4"/>
      <stop offset="1" stop-color="#4b91d0"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#cfe8bf"/>
      <stop offset="1" stop-color="#74b35d"/>
    </linearGradient>
  </defs>

  <g font-family="Tahoma, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(70 125)">
      <rect width="185" height="290" rx="8" fill="#f7fbff" stroke="#2f5f9f"/>
      <text x="92" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2f52">BatchNorm</text>
      <text x="92" y="58" text-anchor="middle" font-size="13" fill="#607088">same C, across N/H/W</text>
      <rect x="42" y="88" width="110" height="160" fill="#dceff8" stroke="#17417c"/>
      <rect x="62" y="108" width="110" height="160" fill="#dceff8" stroke="#17417c"/>
      <rect x="82" y="128" width="110" height="160" fill="url(#blue)" stroke="#17417c"/>
      <line x1="82" y1="168" x2="192" y2="168" stroke="#fff" stroke-opacity=".65"/>
      <line x1="82" y1="208" x2="192" y2="208" stroke="#fff" stroke-opacity=".65"/>
      <text x="92" y="274" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2f52">per channel</text>
    </g>

    <g transform="translate(290 125)">
      <rect width="185" height="290" rx="8" fill="#f7fbff" stroke="#2f5f9f"/>
      <text x="92" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2f52">LayerNorm</text>
      <text x="92" y="58" text-anchor="middle" font-size="13" fill="#607088">one sample, all C/H/W</text>
      <rect x="42" y="88" width="120" height="170" fill="#dceff8" stroke="#17417c"/>
      <rect x="62" y="108" width="120" height="170" fill="url(#blue)" stroke="#17417c"/>
      <rect x="82" y="128" width="120" height="170" fill="none" stroke="#17417c" stroke-dasharray="5 4"/>
      <line x1="62" y1="150" x2="182" y2="150" stroke="#fff" stroke-opacity=".65"/>
      <line x1="62" y1="193" x2="182" y2="193" stroke="#fff" stroke-opacity=".65"/>
      <text x="92" y="274" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2f52">per sample</text>
    </g>

    <g transform="translate(510 125)">
      <rect width="185" height="290" rx="8" fill="#f7fbff" stroke="#2f5f9f"/>
      <text x="92" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2f52">InstanceNorm</text>
      <text x="92" y="58" text-anchor="middle" font-size="13" fill="#607088">one sample, one C</text>
      <rect x="45" y="88" width="120" height="170" fill="#dceff8" stroke="#17417c"/>
      <rect x="65" y="108" width="120" height="170" fill="#dceff8" stroke="#17417c"/>
      <rect x="85" y="128" width="42" height="170" fill="url(#blue)" stroke="#17417c"/>
      <text x="92" y="274" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2f52">per channel map</text>
    </g>

    <g transform="translate(730 125)">
      <rect width="185" height="290" rx="8" fill="#f7fbff" stroke="#2f5f9f"/>
      <text x="92" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2f52">GroupNorm</text>
      <text x="92" y="58" text-anchor="middle" font-size="13" fill="#607088">one sample, channel groups</text>
      <rect x="42" y="88" width="120" height="170" fill="#dceff8" stroke="#17417c"/>
      <rect x="62" y="108" width="120" height="170" fill="#dceff8" stroke="#17417c"/>
      <rect x="82" y="128" width="54" height="170" fill="url(#blue)" stroke="#17417c"/>
      <rect x="136" y="128" width="54" height="170" fill="url(#green)" stroke="#17417c"/>
      <text x="92" y="274" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2f52">per channel group</text>
    </g>
  </g>

  <g font-family="Tahoma, Arial, sans-serif" font-size="14" fill="#607088">
    <text x="89" y="456">BN depends on batch statistics.</text>
    <text x="330" y="456">LN is batch-independent.</text>
    <text x="530" y="456">IN is common in style transfer.</text>
    <text x="736" y="456">GN works well with small batches.</text>
  </g>
</svg>
